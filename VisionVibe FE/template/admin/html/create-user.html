<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionVibe Admin - Thêm người dùng mới</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>VisionVibe</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-glasses"></i> Quản lý sản phẩm</a></li>
                    <li class="active"><a href="users.html"><i class="fas fa-users"></i> Quản lý người dùng</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Quản lý đơn hàng</a></li>
                    <li><a href="promotions.html"><i class="fas fa-percent"></i> Khuyến mãi</a></li>
                    <li><a href="notifications.html"><i class="fas fa-bell"></i> Thông báo</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header>
                <div class="header-content">
                    <div class="header-left">
                        <h1>Thêm người dùng mới</h1>
                    </div>
                    <div class="user-info">
                        <span>admin@visionvibe.com</span>
                        <button class="btn-logout" onclick="handleLogout()">
                            <i class="fas fa-sign-out-alt"></i>
                            Đăng xuất
                        </button>
                    </div>
                </div>
            </header>

            <div class="breadcrumb">
                <a href="index.html">Dashboard</a>
                <i class="fas fa-chevron-right"></i>
                <a href="users.html">Quản lý người dùng</a>
                <i class="fas fa-chevron-right"></i>
                <span>Thêm người dùng mới</span>
            </div>

            <!-- User Create Form -->
            <div class="form-container">
                <form id="createUserForm">
                    <div class="form-section">
                        <h3>Thông tin cá nhân</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Họ và tên:</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Email:</label>
                                <input type="text" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Vui lòng nhập email hợp lệ" required>
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại:</label>
                                <input type="text" pattern="[0-9]{10}" title="Vui lòng nhập số điện thoại 10 chữ số" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Địa chỉ</h3>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label>Địa chỉ chi tiết:</label>
                                <textarea rows="3" required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Thông tin tài khoản</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Tên đăng nhập:</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Mật khẩu:</label>
                                <input type="text" pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$" title="Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ cái và số" required>
                            </div>
                            <div class="form-group">
                                <label>Xác nhận mật khẩu:</label>
                                <input type="text" pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$" title="Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ cái và số" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Phân quyền</h3>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label>Role:</label>
                                <div class="checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="roles" value="admin">
                                        <span>Admin</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="roles" value="sale">
                                        <span>Sale</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="window.location.href='users.html'">Hủy</button>
                        <button type="submit" class="btn-primary">Thêm người dùng</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('createUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add create logic here
            alert('Thêm người dùng thành công!');
            window.location.href = 'users.html';
        });

        function handleLogout() {
            // Add logout logic here
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
