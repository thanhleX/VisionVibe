<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionVibe Admin - Cập nhật người dùng</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>VisionVibe</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-glasses"></i> Quản lý sản phẩm</a></li>
                    <li class="active"><a href="users.html"><i class="fas fa-users"></i> Quản lý người dùng</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Quản lý đơn hàng</a></li>
                    <li><a href="promotions.html"><i class="fas fa-percent"></i> Khuyến mãi</a></li>
                    <li><a href="notifications.html"><i class="fas fa-bell"></i> Thông báo</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header>
                <div class="header-content">
                    <div class="header-left">
                        <h1>Cập nhật người dùng #<span id="userId">U001</span></h1>
                    </div>
                    <div class="user-info">
                        <span>admin@visionvibe.com</span>
                        <button class="btn-logout" onclick="handleLogout()">
                            <i class="fas fa-sign-out-alt"></i>
                            Đăng xuất
                        </button>
                    </div>
                </div>
            </header>

            <div class="breadcrumb">
                <a href="index.html">Dashboard</a>
                <i class="fas fa-chevron-right"></i>
                <a href="users.html">Quản lý người dùng</a>
                <i class="fas fa-chevron-right"></i>
                <span>Cập nhật người dùng #<span id="breadcrumbUserId">U001</span></span>
            </div>

            <!-- User Update Form -->
            <div class="form-container">
                <form id="updateUserForm">
                    <div class="form-section">
                        <h3>Thông tin cá nhân</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Họ và tên:</label>
                                <input type="text" value="Nguyễn Văn A" required>
                            </div>
                            <div class="form-group">
                                <label>Email:</label>
                                <input type="text" value="nguyenvana@email.com"
                                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Vui lòng nhập email hợp lệ"
                                    required>
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại:</label>
                                <input type="text" value="0123456789" pattern="[0-9]{10}"
                                    title="Vui lòng nhập số điện thoại 10 chữ số" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Địa chỉ</h3>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <textarea rows="3" required>123 Đường ABC</textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Thông tin tài khoản</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Mật khẩu mới:</label>
                                <input type="text" placeholder="Để trống nếu không muốn thay đổi">
                            </div>
                            <div class="form-group">
                                <label>Xác nhận mật khẩu:</label>
                                <input type="text" placeholder="Để trống nếu không muốn thay đổi">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Phân quyền</h3>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label>Role:</label>
                                <div class="checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="roles" value="admin" checked>
                                        <span>Admin</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="roles" value="sale" checked>
                                        <span>Sale</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary"
                            onclick="window.location.href='users.html'">Hủy</button>
                        <button type="submit" class="btn-primary">Cập nhật người dùng</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Get user ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || 'U001';

        // Update user ID in the page
        document.getElementById('userId').textContent = userId;
        document.getElementById('breadcrumbUserId').textContent = userId;

        // Handle form submission
        document.getElementById('updateUserForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Add update logic here
            alert('Cập nhật người dùng thành công!');
            window.location.href = 'users.html';
        });

        function handleLogout() {
            // Add logout logic here
            window.location.href = '../login.html';
        }
    </script>
</body>

</html>
