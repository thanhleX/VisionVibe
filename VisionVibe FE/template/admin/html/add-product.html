<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionVibe Admin - Thêm sản phẩm</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>VisionVibe</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li class="active"><a href="products.html"><i class="fas fa-glasses"></i> Quản lý sản phẩm</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Quản lý người dùng</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Quản lý đơn hàng</a></li>
                    <li><a href="promotions.html"><i class="fas fa-percent"></i> Khuyến mãi</a></li>
                    <li><a href="notifications.html"><i class="fas fa-bell"></i> Thông báo</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header>
                <div class="header-content">
                    <div class="header-left">
                        <h1>Thêm sản phẩm mới</h1>
                    </div>
                    <div class="user-info">
                        <span>admin@visionvibe.com</span>
                        <button class="btn-logout" onclick="handleLogout()">
                            <i class="fas fa-sign-out-alt"></i>
                            Đăng xuất
                        </button>
                    </div>
                </div>
            </header>

            <div class="breadcrumb">
                <a href="index.html">Dashboard</a>
                <i class="fas fa-chevron-right"></i>
                <a href="products.html">Quản lý sản phẩm</a>
                <i class="fas fa-chevron-right"></i>
                <span>Thêm sản phẩm mới</span>
            </div>

            <!-- Product Form -->
            <div class="form-container">
                <form id="productForm" class="admin-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Tên sản phẩm:</label>
                            <input type="text" required placeholder="Nhập tên sản phẩm">
                        </div>
                        <div class="form-group">
                            <label>Danh mục:</label>
                            <select required>
                                <option value="">Chọn danh mục</option>
                                <!-- Categories will be loaded here -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Thương hiệu:</label>
                            <select required>
                                <option value="">Chọn thương hiệu</option>
                                <option value="rayban">Ray-Ban</option>
                                <option value="oakley">Oakley</option>
                                <option value="gucci">Gucci</option>
                                <option value="prada">Prada</option>
                                <option value="burberry">Burberry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Giá:</label>
                            <input type="number" required placeholder="Nhập giá">
                        </div>
                        <div class="form-group">
                            <label>Số lượng:</label>
                            <input type="number" required placeholder="Nhập số lượng">
                        </div>
                    </div>
                    
                    <!-- Frame and Lens Options -->
                    <div class="form-section">
                        <h3>Thông số kỹ thuật</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Màu gọng:</label>
                                <div class="color-select-container">
                                    <select id="frameColorSelect" class="color-select">
                                        <option value="">Chọn màu gọng</option>
                                        <option value="black">Đen</option>
                                        <option value="brown">Nâu</option>
                                        <option value="silver">Bạc</option>
                                        <option value="gold">Vàng</option>
                                        <option value="red">Đỏ</option>
                                        <option value="blue">Xanh dương</option>
                                        <option value="green">Xanh lá</option>
                                    </select>
                                    <div id="frameColorTags" class="color-tags"></div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Chất liệu gọng:</label>
                                <select required>
                                    <option value="">Chọn chất liệu</option>
                                    <option value="acetate">Acetate</option>
                                    <option value="metal">Kim loại</option>
                                    <option value="titanium">Titanium</option>
                                    <option value="plastic">Nhựa</option>
                                    <option value="wood">Gỗ</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Màu tròng:</label>
                                <div class="color-select-container">
                                    <select id="lensColorSelect" class="color-select">
                                        <option value="">Chọn màu tròng</option>
                                        <option value="clear">Trong suốt</option>
                                        <option value="gray">Xám</option>
                                        <option value="brown">Nâu</option>
                                        <option value="green">Xanh lá</option>
                                        <option value="blue">Xanh dương</option>
                                        <option value="yellow">Vàng</option>
                                        <option value="mirror">Gương</option>
                                    </select>
                                    <div id="lensColorTags" class="color-tags"></div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Chất liệu tròng:</label>
                                <select required>
                                    <option value="">Chọn chất liệu</option>
                                    <option value="glass">Kính</option>
                                    <option value="polycarbonate">Polycarbonate</option>
                                    <option value="trivex">Trivex</option>
                                    <option value="high-index">High Index</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Mô tả sản phẩm:</label>
                        <textarea rows="4" placeholder="Nhập mô tả sản phẩm"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Hình ảnh sản phẩm:</label>
                        <input type="file" multiple accept="image/*">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="window.location.href='products.html'">Hủy</button>
                        <button type="submit" class="btn-primary">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/product-form.js"></script>
</body>
</html>
